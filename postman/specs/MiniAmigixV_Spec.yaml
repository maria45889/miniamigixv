openapi: 3.0.0
info:
  title: MiniAmigixV API Specification
  description: Documentación técnica de los endpoints de MiniAmigixV.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8000
    description: Servidor Local
paths:
  /api/blogs/:
    get:
      summary: Lista todos los posts del blog.
      responses:
        '200':
          description: Lista de posts obtenida con éxito.
    post:
      summary: Crea un nuevo post en el blog.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titulo:
                  type: string
                contenido:
                  type: string
  /send_message/:
    post:
      summary: Envía un mensaje al chat de la IA.
      responses:
        '200':
          description: Respuesta de la IA recibida.
