{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniAmigixV · Iniciar sesión 💙</title>
<link rel="icon" href="{% static 'chat/img/logo.png' %}">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg0: #05051a; --acc1: #7ee8fa; --acc2: #a78bfa; --acc3: #34eba8; --acc4: #f472b6;
  --txt: #e8eaf6; --sub: rgba(232,234,246,0.5); --faint: rgba(232,234,246,0.25);
  --card: rgba(10,10,35,0.95); --bdr: rgba(126,232,250,0.18);
  --font: 'Sora', sans-serif;
}
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: var(--font); background: #05051a; overflow: hidden; position: relative;
  background-image:
    radial-gradient(ellipse 70% 50% at 15% 15%, rgba(126,232,250,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 85%, rgba(167,139,250,0.08) 0%, transparent 60%);
}
.orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: floatOrb 12s ease-in-out infinite; }
.orb1 { width: 400px; height: 400px; background: rgba(126,232,250,0.07); top: -100px; left: -80px; }
.orb2 { width: 350px; height: 350px; background: rgba(167,139,250,0.07); bottom: -80px; right: -80px; animation-delay: -6s; }
.orb3 { width: 200px; height: 200px; background: rgba(52,235,168,0.05); top: 40%; left: 40%; animation-delay: -3s; }
@keyframes floatOrb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }

/* Particles */
.particles { position: fixed; inset: 0; pointer-events: none; }
.p { position: absolute; border-radius: 50%; background: rgba(126,232,250,0.4); animation: rise linear infinite; }
@keyframes rise { 0%{transform:translateY(100vh) scale(0);opacity:0} 15%{opacity:0.6} 85%{opacity:0.3} 100%{transform:translateY(-10vh) scale(1.3);opacity:0} }

.card {
  position: relative; z-index: 10; width: 380px;
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: 26px; padding: 38px 32px;
  box-shadow: 0 0 0 1px rgba(126,232,250,0.04), 0 40px 80px rgba(0,0,0,0.65);
  animation: slideUp 0.55s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp { from{opacity:0;transform:translateY(28px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

/* Logo */
.logo-wrap { text-align: center; margin-bottom: 20px; }
.logo-ring {
  width: 68px; height: 68px; border-radius: 50%; margin: 0 auto;
  position: relative; display: flex; align-items: center; justify-content: center;
}
.logo-ring::before {
  content: ''; position: absolute; inset: -2px; border-radius: 50%;
  background: conic-gradient(var(--acc1), var(--acc2), var(--acc3), var(--acc1));
  animation: spin 4s linear infinite; z-index: 0;
}
@keyframes spin { to{transform:rotate(360deg)} }
.logo-img {
  position: relative; z-index: 1;
  width: 62px; height: 62px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--bg0);
  box-shadow: 0 0 30px rgba(126,232,250,0.2);
}

h1 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--txt); text-align: center; margin-bottom: 4px; }
.subtitle { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 26px; font-weight: 500; }

.error-box {
  background: rgba(244,114,182,0.09); border: 1px solid rgba(244,114,182,0.22);
  border-radius: 11px; padding: 10px 14px; color: #fda4c8;
  font-size: 12px; margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; gap: 7px;
}

.field { margin-bottom: 13px; }
.field label { display: block; font-size: 9px; font-weight: 700; color: var(--sub); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; }
.input-wrap { position: relative; }
.field-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; z-index: 2; }
.field input {
  width: 100%; padding: 11px 14px 11px 36px;
  border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05); font-family: var(--font);
  font-size: 13px; font-weight: 500; color: var(--txt); outline: none;
  transition: border-color 0.22s, background 0.22s;
}
.field input::placeholder { color: var(--faint); }
.field input:focus { border-color: var(--acc1); background: rgba(126,232,250,0.05); }

.btn {
  width: 100%; padding: 13px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--acc1), var(--acc2));
  color: #05051a; font-family: var(--font); font-size: 14px; font-weight: 800;
  cursor: pointer; margin-top: 6px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 22px rgba(126,232,250,0.22);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(126,232,250,0.38); }
.btn:active { transform: translateY(0); }

.divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--faint); font-size: 11px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

.footer-link { text-align: center; font-size: 13px; color: var(--sub); font-weight: 500; }
.footer-link a { color: var(--acc1); font-weight: 700; }
.footer-link a:hover { color: #b2f0fb; }

.btn-google {
  width: 100%; padding: 12px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06); color: var(--txt); font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.25s ease; text-decoration: none;
}
.btn-google:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
.btn-google svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-ring">
      <img src="{% static 'chat/img/logo.png' %}" alt="Logo" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=M&background=7ee8fa&color=05051a'">
    </div>
  </div>

  <h1>Bienvenida 💙</h1>
  <p class="subtitle">Inicia sesión en MiniAmigixV</p>

  {% if messages %}
    {% for message in messages %}
      <div class="error-box">⚠️ {{ message }}</div>
    {% endfor %}
  {% endif %}
  {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="field">
      <label>Usuario</label>
      <div class="input-wrap">
        <span class="field-icon">👤</span>
        <input type="text" name="username" placeholder="Tu nombre de usuario" required autocomplete="username">
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="field-icon">🔒</span>
        <input type="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
      </div>
    </div>
    <button type="submit" class="btn">Entrar 💌</button>
  </form>

  <div class="footer-link" style="margin-top: 25px;">¿No tienes cuenta? <a href="{% url 'register' %}">Crear cuenta 💫</a></div>
</div>

<script>
var c = document.getElementById('particles');
var colors = ['rgba(126,232,250,0.5)','rgba(167,139,250,0.5)','rgba(52,235,168,0.4)'];
for (var i = 0; i < 20; i++) {
  var p = document.createElement('div'); p.className = 'p';
  var sz = 1.5 + Math.random() * 3;
  p.style.cssText = 'left:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;background:'+colors[i%3]+';animation-duration:'+(8+Math.random()*10)+'s;animation-delay:-'+(Math.random()*15)+'s;';
  c.appendChild(p);
}
</script>
</body>
</html>
