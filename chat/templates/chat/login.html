{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniAmigixV • Login</title>
    <link rel="icon" href="{% static 'chat/img/logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #03030b;
            --acc-blue: #00e5ff;
            --acc-pink: #ff2d95;
            --acc-purple: #9254ff;
            --glass: rgba(10, 10, 20, 0.7);
            --bdr: rgba(0, 229, 255, 0.2);
            --font: 'Sora', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            background: var(--bg-deep);
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* 🪐 NEURAL BACKGROUND */
        .neural-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a1f 0%, #03030b 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 500px; height: 500px; background: var(--acc-blue); top: -100px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--acc-pink); bottom: -100px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--acc-purple); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-duration: 15s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* 🛰️ PORTAL CARD */
        .card {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 50px 45px;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-top: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(0, 229, 255, 0.05);
            animation: emerge 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* 🧬 HEADER */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            width: 100%;
            height: 90px;
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            background: var(--acc-blue);
            filter: blur(40px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: 0;
            animation: pulse-glow 4s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.25; transform: translate(-50%, -50%) scale(1.2); }
        }

        .logo-img {
            max-width: 160px;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-img:hover {
            transform: scale(1.1) rotate(-3deg);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 0;
            background: linear-gradient(135deg, #fff, var(--acc-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ⚡ FORM ELEMENTS */
        .field {
            margin-bottom: 24px;
            position: relative;
        }

        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--acc-blue);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            opacity: 0.8;
            margin-left: 5px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(0, 229, 255, 0.03);
            border-color: var(--acc-blue);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15), inset 0 0 10px rgba(0, 229, 255, 0.05);
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0.4;
            transition: 0.3s;
        }

        .input-group input:focus + .input-icon {
            opacity: 1;
            color: var(--acc-blue);
            text-shadow: 0 0 10px var(--acc-blue);
        }

        /* 🚀 ACTIONS */
        .btn-submit {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background: linear-gradient(135deg, var(--acc-blue), #0077ff);
            border: none;
            border-radius: 16px;
            color: #000;
            font-family: var(--font);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-submit:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 229, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:hover::after {
            left: 150%;
        }

        .btn-submit:active { transform: translateY(0); }

        .footer-nav {
            margin-top: 35px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .footer-nav a {
            color: var(--acc-blue);
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s;
            margin-left: 5px;
        }

        .footer-nav a:hover {
            color: #fff;
            text-shadow: 0 0 15px var(--acc-blue);
        }

        .error-msg {
            background: rgba(255, 45, 149, 0.1);
            border: 1px solid rgba(255, 45, 149, 0.3);
            border-left: 4px solid var(--acc-pink);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--acc-pink);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
            box-shadow: 0 5px 15px rgba(255, 45, 149, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="neural-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <div class="logo-section">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <img src="{% static 'chat/img/logo.png' %}" alt="Logo" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=M&background=00e5ff&color=000'">
            </div>
            <h1>MiniAmigix<span style="font-weight:300; color:var(--acc-blue); -webkit-text-fill-color:var(--acc-blue);">V</span></h1>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">⚠️ {{ message }}</div>
            {% endfor %}
        {% endif %}
        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Usuario</label>
                <div class="input-group">
                    <input type="text" name="username" placeholder="Ingresa tu usuario..." required autocomplete="username">
                    <span class="input-icon">👤</span>
                </div>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <div class="input-group">
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <span class="input-icon">🔒</span>
                </div>
            </div>
            <button type="submit" class="btn-submit">INICIAR SESIÓN</button>
        </form>

        <div class="footer-nav">
            ¿No tienes cuenta? <a href="{% url 'chat:register' %}">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
